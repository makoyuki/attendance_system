<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}勤怠管理{% endblock %} - 勤怠管理システム</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand fw-bold">勤怠管理システム</span>
        <div class="navbar-nav me-auto">
            <a class="nav-link {% block nav_users %}{% endblock %}"
               href="{{ url_for('admin.user_list') }}">ユーザー管理</a>
            <a class="nav-link {% block nav_logs %}{% endblock %}"
               href="{{ url_for('admin.log_list') }}">入退室ログ</a>
            <a class="nav-link {% block nav_reports %}{% endblock %}"
               href="{{ url_for('admin.reports') }}">レポート</a>
            <a class="nav-link {% block nav_settings %}{% endblock %}"
               href="{{ url_for('admin.settings') }}">設定</a>
        </div>
        <div class="navbar-nav">
            <a class="nav-link text-warning"
               href="{{ url_for('admin.logout') }}"
               onclick="return confirm('ログアウトしますか？')">ログアウト</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ 'danger'   if category == 'error'
                                       else 'success' if category == 'success'
                                       else 'warning' }} alert-dismissible fade show">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js">
</script>
</body>
</html>
