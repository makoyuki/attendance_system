<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン - 勤怠管理システム</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; }
        .login-card {
            max-width: 400px;
            margin: 100px auto;
            border: none;
            box-shadow: 0 2px 16px rgba(0,0,0,0.12);
        }
        .login-header {
            background-color: #212529;
            color: white;
            text-align: center;
            padding: 24px;
            border-radius: 6px 6px 0 0;
        }
    </style>
</head>
<body>

<div class="card login-card">
    <div class="login-header">
        <h4 class="mb-0">勤怠管理システム</h4>
        <small class="text-secondary">管理者ログイン</small>
    </div>
    <div class="card-body p-4">

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                <div class="alert alert-{{ 'danger' if category == 'error'
                                           else 'success' if category == 'success'
                                           else 'warning' }}">
                    {{ message }}
                </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="post">
            <div class="mb-3">
                <label for="username" class="form-label">ユーザー名</label>
                <input type="text" class="form-control" id="username" name="username"
                       autofocus required>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">パスワード</label>
                <input type="password" class="form-control" id="password" name="password"
                       required>
            </div>
            <button type="submit" class="btn btn-dark w-100">ログイン</button>
        </form>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
