<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ユーザー追加</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h2>ユーザー追加</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="post">
            <div class="mb-3">
                <label for="felica_id" class="form-label">Felica ID <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="felica_id" name="felica_id"
                       placeholder="例: 0123456789ABCDEF" required>
                <div class="form-text">カードのIDを16進数で入力してください</div>
            </div>

            <div class="mb-3">
                <label for="name" class="form-label">氏名 <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="name" name="name"
                       placeholder="例: 山田太郎" required>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">メールアドレス</label>
                <input type="email" class="form-control" id="email" name="email"
                       placeholder="例: yamada@example.com">
            </div>

            <button type="submit" class="btn btn-primary">追加</button>
            <a href="{{ url_for('admin.user_list') }}" class="btn btn-secondary">戻る</a>
        </form>
    </div>
</body>
</html>
