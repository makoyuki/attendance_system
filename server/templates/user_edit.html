{% extends "base.html" %}
{% block title %}ユーザー編集{% endblock %}
{% block nav_users %}active{% endblock %}

{% block content %}
<h2 class="mb-3">ユーザー編集</h2>

<div class="col-md-6">
    <form method="post">
        <div class="mb-3">
            <label for="felica_id" class="form-label">
                Felica ID <span class="text-danger">*</span>
            </label>
            <input type="text" class="form-control" id="felica_id" name="felica_id"
                   value="{{ user['felica_id'] }}" required>
        </div>
        <div class="mb-3">
            <label for="name" class="form-label">
                氏名 <span class="text-danger">*</span>
            </label>
            <input type="text" class="form-control" id="name" name="name"
                   value="{{ user['name'] }}" required>
        </div>
        <div class="mb-4">
            <label for="email" class="form-label">メールアドレス</label>
            <input type="email" class="form-control" id="email" name="email"
                   value="{{ user['email'] or '' }}">
        </div>
        <button type="submit" class="btn btn-primary">更新</button>
        <a href="{{ url_for('admin.user_list') }}" class="btn btn-secondary">戻る</a>
    </form>
</div>
{% endblock %}
